
<!DOCTYPE html>
<html lang="ru" class="h-full bg-slate-950 text-slate-100 select-none">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VPN Client - Free Cloud Tunnel</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        vpn: {
                            bg: '#08090b',
                            panel: '#0f1115',
                            border: '#1f242e',
                            cyan: '#00e5ff',
                            blue: '#1a73e8',
                            red: '#ff1744',
                            textMuted: '#64748b'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            outline: none;
        }

        /* Анимация пульсации кольца при подключении */
        @keyframes pulse-ring {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(1.25); opacity: 0; }
        }
        .pulse-element {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }

        .log-scroll::-webkit-scrollbar {
            width: 3px;
        }
        .log-scroll::-webkit-scrollbar-thumb {
            background: #1f242e;
            border-radius: 2px;
        }
    </style>
</head>
<body class="h-full flex justify-center items-center bg-[#030405] overflow-hidden font-mono">

    <div class="relative w-full max-w-md h-full md:h-[850px] md:rounded-[32px] md:border-4 md:border-vpn-border bg-vpn-bg flex flex-col justify-between overflow-hidden shadow-2xl p-6">
        
        <!-- Шапка -->
        <header class="flex items-center justify-between border-b border-vpn-border/40 pb-4">
            <div>
                <h1 class="text-xs font-black tracking-widest text-vpn-textMuted uppercase">FREE CLOUD VPN</h1>
                <div class="flex items-center gap-1.5 mt-1">
                    <span id="status-indicator" class="w-1.5 h-1.5 rounded-full bg-vpn-red"></span>
                    <span id="status-text" class="text-[10px] font-bold uppercase text-vpn-red">DISCONNECTED</span>
                </div>
            </div>
            
            <!-- Статус сервера -->
            <div class="bg-vpn-panel border border-vpn-border px-3 py-1.5 rounded-lg flex items-center gap-2">
                <span class="text-[9px] font-black uppercase tracking-wider text-white" id="location-text">US WEST</span>
            </div>
        </header>

        <!-- Выбор прокси-движка -->
        <div class="bg-vpn-panel/50 border border-vpn-border p-3 rounded-xl mt-2">
            <label class="block text-[8px] text-vpn-textMuted font-bold uppercase tracking-wider mb-2">Настройка прокси-сервера</label>
            <div class="flex flex-col gap-2">
                <div class="flex gap-2">
                    <button onclick="setProxyType('public')" id="btn-proxy-public" class="flex-1 py-1 text-[9px] font-bold rounded bg-vpn-border text-white uppercase">Публичный (Демо)</button>
                    <button onclick="setProxyType('private')" id="btn-proxy-private" class="flex-1 py-1 text-[9px] font-bold rounded text-vpn-textMuted uppercase">Свой Cloudflare</button>
                </div>
                <!-- Поле ввода кастомного Cloudflare воркера -->
                <input id="custom-worker-url" type="text" oninput="saveCustomWorker()" placeholder="https://your-worker.workers.dev" class="hidden w-full bg-black border border-vpn-border rounded px-2.5 py-1.5 text-[10px] text-white placeholder-vpn-textMuted" />
            </div>
        </div>

        <!-- Центральная кнопка -->
        <div class="flex flex-col items-center justify-center my-auto py-2 relative">
            <div id="button-glow" class="absolute w-52 h-52 rounded-full bg-vpn-red/5 blur-3xl -z-10 transition-colors duration-500"></div>

            <div class="relative w-40 h-40 flex items-center justify-center">
                <div id="pulse-ring-1" class="pulse-element bg-vpn-red/20 hidden"></div>
                <div id="pulse-ring-2" class="pulse-element bg-vpn-red/10 hidden" style="animation-delay: 0.5s;"></div>

                <button onclick="toggleConnection()" id="vpn-main-btn" class="relative w-32 h-32 rounded-full bg-vpn-panel border-4 border-vpn-red shadow-2xl flex flex-col items-center justify-center cursor-pointer transition-all duration-300 hover:border-white">
                    <span id="btn-label-status" class="text-[10px] font-black tracking-widest text-vpn-red uppercase">CONNECT</span>
                    <span id="btn-label-sub" class="text-[8px] text-vpn-textMuted uppercase mt-1">TAP TO START</span>
                </button>
            </div>

            <!-- Метрики -->
            <div class="grid grid-cols-2 gap-4 mt-6 w-full px-2 text-center">
                <div class="bg-vpn-panel/40 border border-vpn-border/50 p-3 rounded-xl">
                    <span class="block text-[8px] text-vpn-textMuted font-bold uppercase tracking-wider">SPEED</span>
                    <span id="speed-down" class="text-xs font-black text-white mt-1 block">0.00 Mbps</span>
                </div>
                <div class="bg-vpn-panel/40 border border-vpn-border/50 p-3 rounded-xl">
                    <span class="block text-[8px] text-vpn-textMuted font-bold uppercase tracking-wider">UPTIME</span>
                    <span id="connection-timer" class="text-xs font-black text-white mt-1 block">00:00:00</span>
                </div>
            </div>
        </div>

        <!-- Консоль -->
        <div class="bg-black/80 border border-vpn-border/60 p-3 rounded-xl h-28 flex flex-col justify-between">
            <div class="text-[8px] text-vpn-textMuted font-bold uppercase tracking-wider border-b border-vpn-border/30 pb-1 mb-1 flex justify-between">
                <span>TUNNEL CONSOLE LOG</span>
                <span>SECURE MODE</span>
            </div>
            <div id="console-logs" class="log-scroll flex-1 overflow-y-auto text-[9px] text-slate-400 font-mono space-y-1 pr-1">
                <div>[SYSTEM] READY TO ESTABLISH SECURITY TUNNEL</div>
                <div>[SYSTEM] SELECT PROXY TYPE AND TAP CONNECT</div>
            </div>
        </div>

        <!-- Мини-браузер -->
        <div class="mt-4 border-t border-vpn-border/40 pt-4 flex flex-col gap-2">
            <span class="text-[8px] text-vpn-textMuted font-bold uppercase tracking-wider">SANDBOX BROWSER</span>
            
            <div class="flex gap-1.5">
                <input id="proxy-url-input" type="text" disabled placeholder="Сначала подключите VPN..." class="flex-1 bg-vpn-panel border border-vpn-border rounded-lg px-3 py-2 text-xs text-slate-400 placeholder-vpn-textMuted focus:border-vpn-cyan transition-colors" />
                <button onclick="loadPage()" id="proxy-go-btn" disabled class="bg-vpn-border text-slate-500 font-bold text-xs px-4 rounded-lg transition-colors cursor-not-allowed">GO</button>
            </div>
            
            <div class="relative w-full h-36 bg-black rounded-xl border border-vpn-border/50 overflow-hidden flex items-center justify-center">
                <iframe id="proxy-iframe" class="w-full h-full hidden" src="about:blank"></iframe>
                <div id="proxy-placeholder" class="text-[9px] text-vpn-textMuted uppercase text-center p-4">
                    Туннель неактивен.
                </div>
            </div>
        </div>

    </div>

    <!-- Скрипт VPN-Клиента -->
    <script>
        const state = {
            status: 'DISCONNECTED',
            timer: 0,
            timerInterval: null,
            speedInterval: null,
            
            proxyType: 'public', // public или private
            
            // Публичный CORS прокси-сервер, работающий бесплатно без настроек
            publicProxyUrl: "https://api.allorigins.win/raw?url=",
            
            // URL вашего развернутого Cloudflare Worker
            privateProxyUrl: ""
        };

        // Загрузка настроек
        window.onload = function() {
            const savedWorker = localStorage.getItem('cf_worker_url');
            if (savedWorker) {
                document.getElementById('custom-worker-url').value = savedWorker;
                state.privateProxyUrl = savedWorker;
            }
        };

        function setProxyType(type) {
            state.proxyType = type;
            const btnPub = document.getElementById('btn-proxy-public');
            const btnPriv = document.getElementById('btn-proxy-private');
            const inputEl = document.getElementById('custom-worker-url');

            if (type === 'public') {
                btnPub.className = "flex-1 py-1 text-[9px] font-bold rounded bg-vpn-border text-white uppercase";
                btnPriv.className = "flex-1 py-1 text-[9px] font-bold rounded text-vpn-textMuted uppercase";
                inputEl.classList.add('hidden');
                document.getElementById('location-text').innerText = "US CDN";
            } else {
                btnPub.className = "flex-1 py-1 text-[9px] font-bold rounded text-vpn-textMuted uppercase";
                btnPriv.className = "flex-1 py-1 text-[9px] font-bold rounded bg-vpn-border text-white uppercase";
                inputEl.classList.remove('hidden');
                document.getElementById('location-text').innerText = "CLOUDFLARE";
            }
        }

        function saveCustomWorker() {
            const val = document.getElementById('custom-worker-url').value.trim();
            localStorage.setItem('cf_worker_url', val);
            state.privateProxyUrl = val;
        }

        function appendLog(text) {
            const consoleBox = document.getElementById('console-logs');
            const newLog = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            newLog.innerHTML = `<span class="text-vpn-textMuted">[${time}]</span> ${text}`;
            consoleBox.appendChild(newLog);
            consoleBox.scrollTop = consoleBox.scrollHeight;
        }

        function toggleConnection() {
            if (state.status === 'DISCONNECTED') {
                connect();
            } else if (state.status === 'CONNECTED') {
                disconnect();
            }
        }

        function connect() {
            if (state.proxyType === 'private' && !state.privateProxyUrl) {
                appendLog("[ERROR] Введите URL вашего Cloudflare воркера");
                return;
            }

            state.status = 'CONNECTING';
            updateUI();
            
            appendLog("Инициализация бесплатного туннеля...");
            
            setTimeout(() => {
                appendLog("Подключение к удаленной ноде...");
                playBeep(250, 0.1);
            }, 700);

            setTimeout(() => {
                appendLog(state.proxyType === 'public' 
                    ? "Подключение к AllOrigins CDN..." 
                    : "Подключение к Cloudflare Edge Network (US)...");
                playBeep(350, 0.1);
            }, 1400);

            setTimeout(() => {
                state.status = 'CONNECTED';
                appendLog("Туннель успешно установлен. Локация: США/Глобальный узел Cloudflare");
                playBeep(550, 0.25);
                
                startTimer();
                startSpeedSim();
                updateUI();
            }, 2100);
        }

        function disconnect() {
            state.status = 'DISCONNECTING';
            updateUI();
            
            clearInterval(state.timerInterval);
            clearInterval(state.speedInterval);
            state.timer = 0;

            appendLog("Отключение от шлюза...");
            
            setTimeout(() => {
                state.status = 'DISCONNECTED';
                appendLog("Туннель закрыт. Безопасный режим отключен.");
                playBeep(150, 0.2);
                updateUI();
            }, 1000);
        }

        function updateUI() {
            const btn = document.getElementById('vpn-main-btn');
            const statusInd = document.getElementById('status-indicator');
            const statusTxt = document.getElementById('status-text');
            const glow = document.getElementById('button-glow');
            const btnLabel = document.getElementById('btn-label-status');
            const btnSub = document.getElementById('btn-label-sub');
            const rings = document.querySelectorAll('.pulse-element');
            const urlInput = document.getElementById('proxy-url-input');
            const goBtn = document.getElementById('proxy-go-btn');
            const iframe = document.getElementById('proxy-iframe');
            const placeholder = document.getElementById('proxy-placeholder');

            if (state.status === 'DISCONNECTED') {
                btn.className = "relative w-32 h-32 rounded-full bg-vpn-panel border-4 border-vpn-red shadow-2xl flex flex-col items-center justify-center cursor-pointer transition-all duration-300 hover:border-white";
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-vpn-red";
                statusTxt.className = "text-[10px] font-bold uppercase text-vpn-red";
                statusTxt.innerText = "DISCONNECTED";
                glow.className = "absolute w-52 h-52 rounded-full bg-vpn-red/5 blur-3xl -z-10 transition-all duration-500";
                btnLabel.innerText = "CONNECT";
                btnLabel.className = "text-[10px] font-black tracking-widest text-vpn-red uppercase";
                btnSub.innerText = "TAP TO START";
                
                rings.forEach(r => r.classList.add('hidden'));
                
                urlInput.disabled = true;
                urlInput.placeholder = "Сначала подключите VPN...";
                urlInput.className = "flex-1 bg-vpn-panel border border-vpn-border rounded-lg px-3 py-2 text-xs text-slate-500 placeholder-vpn-textMuted";
                goBtn.disabled = true;
                goBtn.className = "bg-vpn-border text-slate-500 font-bold text-xs px-4 rounded-lg cursor-not-allowed";
                
                iframe.classList.add('hidden');
                placeholder.classList.remove('hidden');

                document.getElementById('speed-down').innerText = "0.00 Mbps";
                document.getElementById('connection-timer').innerText = "00:00:00";
            } 
            else if (state.status === 'CONNECTING') {
                btn.className = "relative w-32 h-32 rounded-full bg-vpn-panel border-4 border-yellow-500 shadow-2xl flex flex-col items-center justify-center cursor-pointer animate-pulse";
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-yellow-500";
                statusTxt.className = "text-[10px] font-bold uppercase text-yellow-500";
                statusTxt.innerText = "CONNECTING...";
                btnLabel.innerText = "WAIT";
                btnLabel.className = "text-[10px] font-black tracking-widest text-yellow-500 uppercase";
                btnSub.innerText = "ESTABLISHING...";
            } 
            else if (state.status === 'CONNECTED') {
                btn.className = "relative w-32 h-32 rounded-full bg-vpn-panel border-4 border-vpn-cyan shadow-2xl flex flex-col items-center justify-center cursor-pointer transition-all duration-300 hover:border-white";
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-vpn-cyan";
                statusTxt.className = "text-[10px] font-bold uppercase text-vpn-cyan";
                statusTxt.innerText = "CONNECTED";
                glow.className = "absolute w-52 h-52 rounded-full bg-vpn-cyan/10 blur-3xl -z-10 transition-all duration-500";
                btnLabel.innerText = "DISCONNECT";
                btnLabel.className = "text-[10px] font-black tracking-widest text-vpn-cyan uppercase";
                btnSub.innerText = "TUNNEL RUNNING";
                
                rings.forEach(r => {
                    r.classList.remove('hidden');
                    r.classList.replace('bg-vpn-red/20', 'bg-vpn-cyan/20');
                    r.classList.replace('bg-vpn-red/10', 'bg-vpn-cyan/10');
                });

                urlInput.disabled = false;
                urlInput.placeholder = "Введите URL (например: google.com)...";
                urlInput.className = "flex-1 bg-vpn-panel border border-vpn-border rounded-lg px-3 py-2 text-xs text-white placeholder-vpn-textMuted focus:border-vpn-cyan transition-colors";
                goBtn.disabled = false;
                goBtn.className = "bg-vpn-cyan text-slate-950 font-bold text-xs px-4 rounded-lg cursor-pointer hover:bg-white";
                
                placeholder.classList.add('hidden');
                iframe.classList.remove('hidden');
                iframe.src = "about:blank";
                iframe.contentWindow.document.write("<body style='background:#000;color:#64748b;font-family:monospace;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-size:10px;'>READY FOR SECURE BROWSING.</body>");
            }
            else if (state.status === 'DISCONNECTING') {
                btn.className = "relative w-32 h-32 rounded-full bg-vpn-panel border-4 border-yellow-500 shadow-2xl flex flex-col items-center justify-center cursor-pointer animate-pulse";
                statusInd.className = "w-1.5 h-1.5 rounded-full bg-yellow-500";
                statusTxt.className = "text-[10px] font-bold uppercase text-yellow-500";
                statusTxt.innerText = "DISCONNECTING...";
            }
        }

        function startTimer() {
            state.timerInterval = setInterval(() => {
                state.timer++;
                const hrs = String(Math.floor(state.timer / 3600)).padStart(2, '0');
                const mins = String(Math.floor((state.timer % 3600) / 60)).padStart(2, '0');
                const secs = String(state.timer % 60).padStart(2, '0');
                document.getElementById('connection-timer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        function startSpeedSim() {
            state.speedInterval = setInterval(() => {
                const speed = (15 + Math.random() * 30).toFixed(2);
                document.getElementById('speed-down').innerText = `${speed} Mbps`;
            }, 2000);
        }

        function loadPage() {
            let url = document.getElementById('proxy-url-input').value.trim();
            if (!url) return;

            if (!/^https?:\/\//i.test(url)) {
                url = 'https://' + url;
            }

            appendLog(`Запрос через прокси: ${url}`);
            const iframe = document.getElementById('proxy-iframe');
            
            // Выбираем прокси-сервер (публичный или ваш приватный в Cloudflare)
            let proxyUrl = state.proxyType === 'public' 
                ? state.publicProxyUrl + encodeURIComponent(url)
                : state.privateProxyUrl + "?url=" + encodeURIComponent(url);

            iframe.src = proxyUrl;
            
            iframe.onload = function() {
                appendLog(`Страница ${url} успешно загружена через облачный туннель.`);
            };
        }

        function playBeep(freq, duration) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);

                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch (e) {}
        }
    </script>
</body>
</html>
