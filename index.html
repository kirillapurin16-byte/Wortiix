<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандомайзер (Раз в 24 часа)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background-color: #1e1e1e;
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }
        .result {
            font-size: 54px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #00ff88;
            text-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
            min-height: 65px;
        }
        button {
            background-color: #ff3b30;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 59, 48, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }
        button:hover:not(:disabled) {
            background-color: #e03128;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 59, 48, 0.6);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled {
            background-color: #333333;
            color: #777777;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }
        .footer-text {
            margin-top: 35px;
            font-size: 14px;
            color: #aaaaaa;
            line-height: 1.5;
            border-top: 1px solid #333;
            padding-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="result" id="numberDisplay">?????</div>
    <button id="rollButton" onclick="generateNumber()">Посмотреть</button>
    <div class="footer-text">
        Всё что вы выбили это тОчки, чтоб забрать выйгрыш обратитесь к @wortiix и предоставьте скриншот выйгрыша
    </div>
</div>

<script>
    const COOLDOWN_TIME = 24 * 60 * 60 * 1000; // 24 часа в миллисекундах
    const button = document.getElementById('rollButton');
    const display = document.getElementById('numberDisplay');
    let countdownInterval;

    // Проверка при загрузке страницы
    window.onload = function() {
        const lastClick = localStorage.getItem('last_click_time');
        const lastNum = localStorage.getItem('last_generated_num');

        if (lastClick && lastNum) {
            const timePassed = Date.now() - parseInt(lastClick);
            
            if (timePassed < COOLDOWN_TIME) {
                // Если 24 часа еще не прошло, показываем прошлый результат и запускаем таймер
                display.innerText = parseInt(lastNum).toLocaleString('ru-RU');
                startCountdown(parseInt(lastClick));
            } else {
                // Время прошло, можно снова крутить
                localStorage.removeItem('last_click_time');
                localStorage.removeItem('last_generated_num');
            }
        }
    };

    function generateNumber() {
        // Дополнительная проверка безопасности в коде
        const lastClick = localStorage.getItem('last_click_time');
        if (lastClick && (Date.now() - parseInt(lastClick) < COOLDOWN_TIME)) return;

        let result;
        while (true) {
            let u = 0, v = 0;
            while(u === 0) u = Math.random(); 
            while(v === 0) v = Math.random();
            let num = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            
            result = Math.floor(num * 10000 + 20000); // Около 20к
            
            if (result >= 1 && result <= 50000) {
                break;
            }
        }

        const now = Date.now();
        // Сохраняем результат и время клика
        localStorage.setItem('last_click_time', now);
        localStorage.setItem('last_generated_num', result);

        // Обновляем экран
        display.innerText = result.toLocaleString('ru-RU');
        startCountdown(now);
    }

    function startCountdown(startTime) {
        button.disabled = true;

        function updateTimer() {
            const now = Date.now();
            const timeLeft = (startTime + COOLDOWN_TIME) - now;

            if (timeLeft <= 0) {
                clearInterval(countdownInterval);
                button.disabled = false;
                button.innerText = "Посмотреть";
                display.innerText = "?????";
                localStorage.removeItem('last_click_time');
                localStorage.removeItem('last_generated_num');
                return;
            }

            const hours = Math.floor(timeLeft / (1000 * 60 * 60));
            const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);

            // Форматируем вывод (добавляем нули для красоты: 02:05:09)
            const hDisplay = hours < 10 ? '0' + hours : hours;
            const mDisplay = minutes < 10 ? '0' + minutes : minutes;
            const sDisplay = seconds < 10 ? '0' + seconds : seconds;

            button.innerText = `Еще ${hDisplay}:${mDisplay}:${sDisplay}`;
        }

        updateTimer();
        countdownInterval = setInterval(updateTimer, 1000);
    }
</script>

</body>
</html>
