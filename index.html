<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck My Duck</title>
    <!-- Telegram Web App API -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем жирный шрифт для мем-стиля -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0b0e;
            --duck-yellow: #fcd116;
            --duck-orange: #f39c12;
            --gold: #f39c12;
            --text-main: #ffffff;
            --panel-bg: #15161c;
            --accent-green: #2ecc71;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', 'Segoe UI', sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Главный контейнер игры */
        #app-container {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 480px;
            margin: 0 auto;
            background: radial-gradient(circle at center, #1c1c24 0%, #0b0b0e 100%);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(252, 209, 22, 0.1);
        }

        /* --- ЭКРАН ВХОДА (SPLASH SCREEN) --- */
        #splash-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 45%, #2a2510 0%, #08080a 70%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            transition: opacity 0.8s cubic-bezier(0.25, 1, 0.5, 1), transform 0.8s ease;
        }

        #splash-screen.fade-out {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }

        /* Задний неоновый свет утки */
        .duck-glow-backdrop {
            position: absolute;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(252, 209, 22, 0.35) 0%, rgba(252, 209, 22, 0) 70%);
            top: 15%;
            border-radius: 50%;
            filter: blur(20px);
            z-index: 1;
            animation: pulseGlow 3s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.15); opacity: 1; }
        }

        /* Анимированные летающие монеты */
        .flying-coins-container {
            position: absolute;
            width: 100%;
            height: 60%;
            top: 10%;
            pointer-events: none;
            z-index: 2;
        }

        .splash-coin {
            position: absolute;
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.6), inset 0 0 4px rgba(255,255,255,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #7e5109;
            font-size: 14px;
        }

        .coin-1 { top: 20%; left: 15%; animation: floatCoin 4s infinite ease-in-out; transform: rotate(15deg); }
        .coin-2 { top: 35%; right: 10%; animation: floatCoin 5s infinite ease-in-out 1s; transform: rotate(-25deg); }
        .coin-3 { top: 60%; left: 10%; animation: floatCoin 4.5s infinite ease-in-out 0.5s; transform: rotate(45deg); }
        .coin-4 { top: 65%; right: 18%; animation: floatCoin 5.5s infinite ease-in-out 1.5s; transform: rotate(-10deg); }

        @keyframes floatCoin {
            0%, 100% { transform: translateY(0) rotate(var(--r, 15deg)); }
            50% { transform: translateY(-15px) rotate(calc(var(--r, 15deg) + 10deg)); }
        }

        /* Стильный SVG персонаж Утки */
        .duck-character-wrapper {
            position: relative;
            z-index: 5;
            width: 250px;
            height: 250px;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Текст DUCK MY DUCK */
        .duck-logo-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 38px;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            text-align: center;
            z-index: 10;
            margin-top: -20px;
            letter-spacing: -1px;
            /* Реализация массивной обводки в точности как на скрине */
            text-shadow: 
                3px 3px 0px #000, 
                -3px 3px 0px #000, 
                3px -3px 0px #000, 
                -3px -3px 0px #000,
                0px 4px 15px rgba(0, 0, 0, 0.6);
            transform: scale(1.05);
            animation: textPulse 2s infinite ease-in-out;
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1.05); }
            50% { transform: scale(1.08); }
        }

        /* Прогресс-круговой лоудер */
        .loader-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .circular-loader {
            position: relative;
            width: 50px;
            height: 50px;
        }

        .circular-loader svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circular-loader circle {
            fill: none;
            stroke-width: 4;
            stroke-linecap: round;
        }

        .circular-loader .bg {
            stroke: rgba(255, 255, 255, 0.08);
        }

        .circular-loader .progress {
            stroke: var(--duck-yellow);
            stroke-dasharray: 126; /* 2 * PI * r (r=20) */
            stroke-dashoffset: 126;
            transition: stroke-dashoffset 0.1s linear;
            filter: drop-shadow(0 0 6px var(--duck-yellow));
        }

        .loader-text {
            font-size: 13px;
            color: #a0a5b5;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* --- ГЛАВНЫЙ ИНТЕРФЕЙС ИГРЫ --- */
        #game-interface {
            flex: 1;
            display: flex;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #game-interface.active {
            opacity: 1;
        }

        /* Игровая Шапка */
        .game-header {
            padding: 16px;
            background: rgba(21, 22, 28, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .mini-profile {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .mini-avatar {
            width: 40px;
            height: 40px;
            background: var(--duck-yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #000;
        }

        .user-info-text {
            display: flex;
            flex-direction: column;
        }

        .username {
            font-weight: 800;
            font-size: 14px;
        }

        .rank-badge {
            font-size: 11px;
            color: var(--duck-yellow);
            font-weight: bold;
        }

        /* Панель пассивного дохода */
        .passive-income-panel {
            background: rgba(255, 255, 255, 0.02);
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 12px;
            text-align: right;
        }

        .passive-income-panel span {
            color: var(--duck-yellow);
            font-weight: bold;
        }

        /* Главный баланс */
        .balance-container {
            padding: 30px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .balance-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8c91a3;
        }

        .balance-value {
            font-size: 44px;
            font-weight: 900;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 0 20px rgba(252, 209, 22, 0.2);
        }

        .balance-coin-icon {
            font-size: 34px;
            animation: spin 8s infinite linear;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Контейнер карточек прокачки */
        .game-viewport {
            flex: 1;
            overflow-y: auto;
            padding: 10px 16px 90px 16px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 12px;
            color: #8c91a3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .upgrade-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s, transform 0.1s;
        }

        .upgrade-card:active {
            transform: scale(0.98);
        }

        .upgrade-card.affordable {
            border-color: rgba(252, 209, 22, 0.15);
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .card-icon {
            font-size: 28px;
            background: rgba(252, 209, 22, 0.05);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            border: 1px solid rgba(252, 209, 22, 0.1);
        }

        .card-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .card-name {
            font-weight: 800;
            font-size: 15px;
        }

        .card-level {
            font-size: 11px;
            color: var(--duck-yellow);
            font-weight: bold;
        }

        .card-effect {
            font-size: 11px;
            color: #8c91a3;
        }

        .buy-button {
            background: linear-gradient(135deg, #f1c40f, #f39c12);
            border: none;
            color: #000000;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 13px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(243, 156, 18, 0.2);
            transition: all 0.2s;
        }

        .buy-button.locked {
            background: #25262e;
            color: #555768;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Канвас эффекта взрыва монет */
        #effect-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        /* Нижнее меню навигации */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(21, 22, 28, 0.95);
            backdrop-filter: blur(15px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 40;
            padding: 0 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #8c91a3;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: color 0.2s;
            width: 30%;
            height: 100%;
        }

        .nav-item.active {
            color: var(--duck-yellow);
        }

        .nav-item-icon {
            font-size: 20px;
            margin-bottom: 2px;
        }
    </style>
</head>
<body>

<div id="app-container">
    <!-- Канвас эффекта монет -->
    <canvas id="effect-canvas"></canvas>

    <!-- ================= ЭКРАН ВХОДА ================= -->
    <div id="splash-screen">
        <!-- Бэк неон -->
        <div class="duck-glow-backdrop"></div>

        <!-- Летающие монеты из скрина -->
        <div class="flying-coins-container">
            <div class="splash-coin coin-1">D</div>
            <div class="splash-coin coin-2" style="--r: -25deg;">D</div>
            <div class="splash-coin coin-3" style="--r: 45deg;">D</div>
            <div class="splash-coin coin-4" style="--r: -10deg;">D</div>
        </div>

        <!-- Отрисовка векторной утки (в точности по вашему скрину) -->
        <div class="duck-character-wrapper">
            <svg viewBox="0 0 200 200" width="100%" height="100%">
                <!-- Волосы / Ирокез -->
                <path d="M 80,45 C 85,15 110,25 125,15 C 120,30 135,35 140,45 C 145,35 155,42 160,52 C 145,60 130,55 120,55 Z" fill="#fcd116" />
                <path d="M 125,15 C 135,28 135,32 140,45 Z" fill="#f1c40f" />
                
                <!-- Голова -->
                <ellipse cx="100" cy="100" rx="65" ry="60" fill="#fcd116" />
                
                <!-- Тень на голове -->
                <path d="M 40,110 C 50,140 100,165 155,120 C 162,105 165,95 165,90 C 165,140 120,160 100,160 C 60,160 38,130 40,110 Z" fill="#e2ba05" opacity="0.4"/>

                <!-- Очки (Крутая форма по скрину) -->
                <!-- Левая линза -->
                <path d="M 38,92 C 38,82 55,80 88,86 C 88,102 85,118 68,118 C 50,118 38,108 38,92 Z" fill="#1e1e1e" stroke="#0f0f0f" stroke-width="4" />
                <!-- Правая линза -->
                <path d="M 162,92 C 162,82 145,80 112,86 C 112,102 115,118 132,118 C 150,118 162,108 162,92 Z" fill="#1e1e1e" stroke="#0f0f0f" stroke-width="4" />
                <!-- Дужка очков -->
                <rect x="85" y="85" width="30" height="8" rx="3" fill="#0f0f0f" />
                <!-- Отражения на очках -->
                <ellipse cx="55" cy="95" rx="8" ry="4" fill="#ffffff" opacity="0.2" transform="rotate(-15, 55, 95)" />
                <ellipse cx="145" cy="95" rx="8" ry="4" fill="#ffffff" opacity="0.2" transform="rotate(-15, 145, 95)" />

                <!-- Клюв (Серьезный вид) -->
                <path d="M 72,112 C 72,100 128,100 128,112 C 128,132 120,144 100,144 C 80,144 72,132 72,112 Z" fill="#f39c12" stroke="#d35400" stroke-width="3" />
                <!-- Линия рта -->
                <path d="M 72,115 C 85,122 115,122 128,115" fill="none" stroke="#2c3e50" stroke-width="4" stroke-linecap="round" />
                <!-- Ноздри -->
                <ellipse cx="94" cy="110" rx="2.5" ry="1.5" fill="#d35400" />
                <ellipse cx="106" cy="110" rx="2.5" ry="1.5" fill="#d35400" />
            </svg>
        </div>

        <!-- Надпись DUCK MY DUCK -->
        <div class="duck-logo-text">DUCK MY DUCK</div>

        <!-- Реалистичный прогресс лоадер -->
        <div class="loader-container">
            <div class="circular-loader">
                <svg>
                    <circle class="bg" cx="25" cy="25" r="20" />
                    <circle class="progress" id="loadingCircle" cx="25" cy="25" r="20" />
                </svg>
            </div>
            <div class="loader-text" id="loaderPercent">0%</div>
        </div>
    </div>


    <!-- ================= ИГРОВОЙ ИНТЕРФЕЙС ================= -->
    <div id="game-interface">
        <!-- Шапка -->
        <div class="game-header">
            <div class="mini-profile">
                <div class="mini-avatar">🕶️</div>
                <div class="user-info-text">
                    <span class="username" id="displayUsername">Cool Duck</span>
                    <span class="rank-badge" id="displayRank">Утиный Навигатор</span>
                </div>
            </div>
            <div class="passive-income-panel">
                Доход: <span id="incomeVal">+0.0 / с</span>
            </div>
        </div>

        <!-- Баланс -->
        <div class="balance-container">
            <span class="balance-title">Баланс утиных токенов</span>
            <div class="balance-value">
                <span class="balance-coin-icon">🟡</span>
                <span id="balanceVal">0.00</span>
            </div>
        </div>

        <!-- Прокачка -->
        <div class="game-viewport">
            <div class="section-title">Апгрейды производства</div>
            <div class="cards-grid" id="upgradesGrid">
                <!-- Карточки будут сгенерированы динамически -->
            </div>
        </div>

        <!-- Футер меню -->
        <div class="bottom-nav">
            <div class="nav-item active">
                <span class="nav-item-icon">🕶️</span>
                <span>Главная</span>
            </div>
            <div class="nav-item" onclick="alert('Утиный Клан в разработке!')">
                <span class="nav-item-icon">🦆</span>
                <span>Кланы</span>
            </div>
            <div class="nav-item" onclick="alert('Рефералы будут доступны в бета-версии!')">
                <span class="nav-item-icon">👥</span>
                <span>Друзья</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Телеграм Инициализация
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Переменные состояния
    let progress = 0;
    let balance = 100.00;
    let incomePerSecond = 0;

    // Карточки прокачки
    const upgrades = {
        duckGlasses: { id: 'duckGlasses', name: 'Модные очки', level: 0, cost: 50, costMultiplier: 1.5, income: 0.5, icon: '🕶️' },
        rubberPool: { id: 'rubberPool', name: 'Резиновый бассейн', level: 0, cost: 200, costMultiplier: 1.6, income: 2.5, icon: '🛁' },
        cryptoPond: { id: 'cryptoPond', name: 'Крипто-Пруд', level: 0, cost: 1000, costMultiplier: 1.7, income: 15.0, icon: '🌊' },
        quackBank: { id: 'quackBank', name: 'Кряк-ИнвестБанк', level: 0, cost: 5000, costMultiplier: 1.8, income: 85.0, icon: '🏦' }
    };

    // Настройка анимации экрана входа (лоудера)
    const circle = document.getElementById('loadingCircle');
    const percentText = document.getElementById('loaderPercent');
    const radius = circle.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;

    // Плавная загрузка
    const loadingInterval = setInterval(() => {
        progress += Math.floor(Math.random() * 8) + 2;
        if (progress >= 100) {
            progress = 100;
            clearInterval(loadingInterval);
            
            // Завершаем лоадер и переходим к игре
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('fade-out');
                document.getElementById('game-interface').classList.add('active');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 500);
        }

        // Обновляем круговой SVG лоудер
        const offset = circumference - (progress / 100) * circumference;
        circle.style.strokeDashoffset = offset;
        percentText.textContent = `${progress}%`;
    }, 150);

    // Загрузка сохранений
    function loadSave() {
        const saved = localStorage.getItem('duck_my_duck_progressive_save');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                balance = parsed.balance || 100.00;
                for (let key in parsed.upgrades) {
                    if (upgrades[key]) {
                        upgrades[key].level = parsed.upgrades[key].level;
                    }
                }
            } catch(e) {}
        }
        recalculateIncome();
    }

    function saveGame() {
        const data = {
            balance: balance,
            upgrades: Object.keys(upgrades).reduce((acc, cur) => {
                acc[cur] = { level: upgrades[cur].level };
                return acc;
            }, {})
        };
        localStorage.setItem('duck_my_duck_progressive_save', JSON.stringify(data));
    }

    // Рассчет пассивного дохода
    function recalculateIncome() {
        incomePerSecond = 0;
        for (let key in upgrades) {
            incomePerSecond += upgrades[key].level * upgrades[key].income;
        }
        document.getElementById('incomeVal').textContent = `+${incomePerSecond.toFixed(1)}/с`;
    }

    // Рассчет стоимости
    function getCost(upg) {
        return Math.floor(upg.cost * Math.pow(upg.costMultiplier, upg.level));
    }

    // Отрисовка карточек
    function renderCards() {
        const container = document.getElementById('upgradesGrid');
        container.innerHTML = '';

        for (let key in upgrades) {
            const upg = upgrades[key];
            const currentCost = getCost(upg);
            const canBuy = balance >= currentCost;

            const card = document.createElement('div');
            card.className = `upgrade-card ${canBuy ? 'affordable' : ''}`;
            card.innerHTML = `
                <div class="card-left">
                    <div class="card-icon">${upg.icon}</div>
                    <div class="card-details">
                        <span class="card-name">${upg.name}</span>
                        <span class="card-level">Уровень ${upg.level}</span>
                        <span class="card-effect">Доход: +${(upg.level * upg.income).toFixed(1)}/с (+${upg.income}/с)</span>
                    </div>
                </div>
                <button class="buy-button ${canBuy ? '' : 'locked'}" onclick="buyUpgrade('${key}')">
                    ${currentCost} 🟡
                </button>
            `;
            container.appendChild(card);
        }
    }

    // Покупка улучшений
    window.buyUpgrade = function(key) {
        const upg = upgrades[key];
        const cost = getCost(upg);

        if (balance >= cost) {
            balance -= cost;
            upg.level++;
            
            recalculateIncome();
            renderCards();
            updateUI();
            saveGame();
            
            // Взрыв монет
            createCoinExplosion();

            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        } else {
            if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        }
    };

    function updateUI() {
        document.getElementById('balanceVal').textContent = balance.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // Эффект взрыва монет (Canvas)
    const canvas = document.getElementById('effect-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    class CoinParticle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = Math.random() * 6 + 4;
            this.angle = Math.random() * Math.PI * 2;
            this.speed = Math.random() * 5 + 3;
            this.vx = Math.cos(this.angle) * this.speed;
            this.vy = Math.sin(this.angle) * this.speed - 3; // Вверх
            this.gravity = 0.25;
            this.alpha = 1;
            this.decay = Math.random() * 0.02 + 0.015;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.vy += this.gravity;
            this.alpha -= this.decay;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.fillStyle = '#f39c12';
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }
    }

    function createCoinExplosion() {
        const x = canvas.width / 2;
        const y = canvas.height / 2;
        for (let i = 0; i < 20; i++) {
            particles.push(new CoinParticle(x, y));
        }
    }

    function animateParticles() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();
            if (p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    // Каждую секунду пассивный доход
    let lastTick = Date.now();
    setInterval(() => {
        const now = Date.now();
        const delta = (now - lastTick) / 1000;
        lastTick = now;

        if (incomePerSecond > 0) {
            balance += incomePerSecond * delta;
            updateUI();
        }

        // Обновляем доступность карточек
        renderCards();
    }, 100);

    // Автосохранение
    setInterval(saveGame, 5000);

    // Старт
    loadSave();
    updateUI();
</script>
</body>
</html>
