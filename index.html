<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CS Telegram Edition</title>
    <!-- Подключаем SDK Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #12141c;
            --panel-color: #1b1e28;
            --cs-orange: #de9b35;
            --text-color: #e2e8f0;
            
            /* Раритетность скинов */
            --rarity-covert: #eb4b4b; /* Тайное */
            --rarity-classified: #d32ce6; /* Засекреченное */
            --rarity-milspec: #4b69ff; /* Армейское */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
        }

        /* --- ЗАСТАВКА В СТИЛЕ CS --- */
        #intro-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=1000') no-repeat center center;
            background-size: cover;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            transition: opacity 0.8s ease;
        }

        .cs-logo {
            text-align: center;
            margin-top: 20%;
        }

        .cs-logo h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 20px rgba(222, 155, 53, 0.6);
        }

        .cs-logo span {
            color: var(--cs-orange);
        }

        .loading-box {
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        .loading-text {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background-color: var(--cs-orange);
            box-shadow: 0 0 10px var(--cs-orange);
            transition: width 0.1s linear;
        }

        /* --- ОСНОВНАЯ ИГРА --- */
        #main-game {
            display: none;
            height: 100vh;
            flex-direction: column;
        }

        header {
            background-color: var(--panel-color);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #2c313f;
        }

        .user-info h3 {
            color: var(--cs-orange);
            font-size: 1.1rem;
        }

        .balance {
            font-size: 1.2rem;
            font-weight: bold;
            color: #4caf50;
        }

        /* Вкладки */
        .nav-tabs {
            display: flex;
            background-color: var(--panel-color);
            border-bottom: 1px solid #2c313f;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 0;
            background: none;
            border: none;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            color: var(--cs-orange);
            border-bottom-color: var(--cs-orange);
            background-color: rgba(222, 155, 53, 0.05);
        }

        .tab-content {
            flex: 1;
            display: none;
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
        }

        /* Кликер / Кейсы */
        .clicker-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            gap: 30px;
        }

        .case-target {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(222,155,53,0.2) 0%, rgba(0,0,0,0) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .case-target:active {
            transform: scale(0.95);
        }

        .case-target img {
            width: 150px;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        .btn-main {
            background-color: var(--cs-orange);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(222, 155, 53, 0.3);
        }

        /* Сетка инвентаря */
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .skin-card {
            background-color: var(--panel-color);
            border-radius: 6px;
            padding: 10px;
            text-align: center;
            border-bottom: 4px solid var(--rarity-milspec);
            position: relative;
        }

        .skin-card.covert { border-bottom-color: var(--rarity-covert); }
        .skin-card.classified { border-bottom-color: var(--rarity-classified); }
        .skin-card.milspec { border-bottom-color: var(--rarity-milspec); }

        .skin-card img {
            width: 80%;
            margin: 10px 0;
        }

        .skin-name {
            font-size: 0.85rem;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .skin-price {
            font-size: 0.8rem;
            color: #4caf50;
            margin-top: 5px;
        }

        /* Трейд Зона */
        .trade-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .trade-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            min-height: 100px;
            background: rgba(0,0,0,0.2);
            border: 2px dashed #333;
            border-radius: 6px;
            padding: 10px;
            align-items: center;
            text-align: center;
        }

        .trade-info-text {
            font-size: 0.85rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- ЗАСТАВКА CS -->
    <div id="intro-screen">
        <div class="cs-logo">
            <h1>CS<span>:GO</span></h1>
            <p style="color: #aaa; letter-spacing: 2px; font-size: 0.8rem;">TELEGRAM MINI APP</p>
        </div>
        <div class="loading-box">
            <div class="loading-text" id="loader-status">Подключение к серверам...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="loader-fill"></div>
            </div>
        </div>
    </div>

    <!-- ОСНОВНОЙ ИНТЕРФЕЙС ИГРЫ -->
    <div id="main-game">
        <header>
            <div class="user-info">
                <h3 id="username">Игрок</h3>
            </div>
            <div class="balance">$<span id="balance-val">0</span></div>
        </header>

        <!-- Навигация -->
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('cases')">Кейсы</button>
            <button class="tab-btn" onclick="switchTab('inventory')">Инвентарь (<span id="inv-count">0</span>)</button>
            <button class="tab-btn" onclick="switchTab('trade')">Контракт</button>
        </div>

        <!-- ВКЛАДКА КЕЙСОВ -->
        <div id="tab-cases" class="tab-content active">
            <div class="clicker-container">
                <h2 style="font-size: 1.2rem; text-align: center;">Жми на кейс, чтобы фармить баланс!</h2>
                <div class="case-target" onclick="clickCase()">
                    <!-- Картинка кейса CS2 -->
                    <img src="https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXU5A1PIYQNqhpOSV-fRPas6nGvXFBoLd96uqScfDhp0vGfcm8RvN_mxtSOx6SgMOmFwGgBuZ0gi7vE89Sj3gXnr0RtYm_1cofBcVM8ZAnQ8gK2kO7v0JS0tJSfznE27HI8pSGKIonN7g" alt="CS Case">
                </div>
                <button class="btn-main" onclick="openCase()">Открыть Кейс ($100)</button>
            </div>
        </div>

        <!-- ВКЛАДКА ИНВЕНТАРЯ -->
        <div id="tab-inventory" class="tab-content">
            <div class="inventory-grid" id="inventory-list">
                <!-- Сюда падают скины -->
            </div>
        </div>

        <!-- ВКЛАДКА ТРЕЙДА (КОНТРАКТЫ) -->
        <div id="tab-trade" class="tab-content">
            <div class="trade-container">
                <h3 style="text-align: center;">Контракт обмена (Трейд с Ботом)</h3>
                <p class="trade-info-text">Положите 3 любых скина, чтобы выменять у бота 1 случайный скин уровнем ВЫШЕ!</p>
                
                <div class="trade-slots" id="trade-slots-area">
                    <!-- Выбранные для трейда скины -->
                     <div style="color: #555; grid-column: span 3;">Выберите скины из инвентаря ниже</div>
                </div>

                <button class="btn-main" style="width: 100%;" onclick="executeTrade()">Запустить контракт</button>

                <h4 style="margin-top: 10px;">Доступно для обмена:</h4>
                <div class="inventory-grid" id="trade-available-list"></div>
            </div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp API
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрываем на весь экран

        // Установка имени пользователя из TG
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('username').innerText = tg.initDataUnsafe.user.first_name;
        }

        // Состояние игры (Данные)
        let gameState = {
            balance: 500,
            inventory: [
                { id: 1, name: "AK-47 | Элитное снаряжение", rarity: "milspec", price: 15, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4Ymh6UeXFLUv93ufsc6fAt7IAtVv7WpKwVk3_33fDxQ69Szkb-Yg_P4O7fXmFRV7cZ3i-vE896giwO1rhE-N2v6J9XAcAI-aAnW8ljvxey7g5C1vJzKy3Fk7HQg7XfD30vg_vXkXg" }
            ],
            tradeSelected: []
        };

        // База доступных скинов для дропа
        const skinPool = [
            { name: "M4A4 | Магний", rarity: "milspec", price: 12, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4Ymh6UeXFLUv93ufsc6fAt7IFVSuLOkKAVf2PCfJG0R79Szkb-Yg_P4O7fXmFRV7cZ3i-vE89-j0wawqBA-Ym_1cI6UdwI4NArT_Ffqw7-70cS87ZzAn3Uws3Jw4SmdgVXz1itgZ_Y" },
            { name: "AWP | Капилляр", rarity: "milspec", price: 25, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4Ymh6UeXFLUv93ufsc6fAt7IAtdv7WpLA9h7v_3fDxQ69Szkb-Yg_P4O7fXmFRV7cZ3i-vE89-h2wS1_0ZvNTjzd9CQJg9vYFrUrw65m9OgpA" },
            { name: "AK-47 | Легион Анубиса", rarity: "classified", price: 85, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4Ymh6UeXFLUv93ufsc6fAt7IKVev7upLwku186YInMXu9mzkb-Ch_b7MrbUqWdY781lxOiS8In33wXiqkpkMTzzJtDHJwE4YF7Q_VfoxO7ohpDuusvInXU2pGB8slvV7bE" },
            { name: "M4A1-S | Поток информации", rarity: "covert", price: 320, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4Ymh6UeXFLUv93ufsc6fAt7IAtcvL-gKAVf1Pr3fDxQ69Szkb-KhKbyNrrXl3lU18h0itbN_Iv9nBrm_0U-YGugI4DHJwVtZAnR_wK2kPC70ZS67cidnXM273N25SmdgVXz1hhp0mB" },
            { name: "Нож Керамбит | Волны", rarity: "covert", price: 1200, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4Ymh6UeXFLUv93ufsc6fAt7IKVv5OnxKAVl3vmYIG8Su9mKzdHawn6tYeuIzj0BsZZ03-vE89X20ALtr0BlZmr3co7EcQE_NwvYrla-w7q9m9bi60A5zFA" }
        ];

        // Имитация загрузки CS
        window.addEventListener('DOMContentLoaded', () => {
            let progress = 0;
            const fill = document.getElementById('loader-fill');
            const status = document.getElementById('loader-status');
            
            const stages = ["Загрузка ресурсов...", "Проверка шейдеров...", "Синхронизация инвентаря...", "Готово!"];
            
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 15) + 5;
                if (progress > 100) progress = 100;
                
                fill.style.width = `${progress}%`;
                
                if(progress < 30) status.innerText = stages[0];
                else if(progress < 60) status.innerText = stages[1];
                else if(progress < 90) status.innerText = stages[2];
                else status.innerText = stages[3];

                if (progress >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('intro-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('intro-screen').style.display = 'none';
                            document.getElementById('main-game').style.display = 'flex';
                            updateUI();
                        }, 800);
                    }, 500);
                }
            }, 150);
        });

        // Обновление интерфейса
        function updateUI() {
            document.getElementById('balance-val').innerText = gameState.balance;
            document.getElementById('inv-count').innerText = gameState.inventory.length;
            renderInventory();
            renderTradeLists();
        }

        // Переключение вкладок
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabName}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Клик по кейсу (добыча валюты)
        function clickCase() {
            gameState.balance += 5;
            // Лёгкая вибрация телефона при клике через TG SDK
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            updateUI();
        }

        // Открытие кейса
        function openCase() {
            if (gameState.balance < 100) {
                alert("Недостаточно денег! Покликай на кейс.");
                return;
            }
            
            gameState.balance -= 100;
            
            // Алгоритм шансов дропа
            const rand = Math.random() * 100;
            let droppedSkin;
            
            if (rand < 65) droppedSkin = skinPool[Math.floor(Math.random() * 2)]; // 65% Milspec
            else if (rand < 90) droppedSkin = skinPool[2]; // 25% Classified
            else droppedSkin = skinPool[3 + Math.floor(Math.random() * 2)]; // 10% Covert/Knife
            
            const newSkin = { ...droppedSkin, id: Date.now() };
            gameState.inventory.push(newSkin);
            
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            alert(`🎉 Вы выбили: ${newSkin.name} ($${newSkin.price})`);
            updateUI();
        }

        // Рендер инвентаря
        function renderInventory() {
            const container = document.getElementById('inventory-list');
            container.innerHTML = '';
            
            if(gameState.inventory.length === 0) {
                container.innerHTML = '<p style="grid-column: span 2; text-align:center; color:#555;">Инвентарь пуст</p>';
                return;
            }

            gameState.inventory.forEach(skin => {
                const card = document.createElement('div');
                card.className = `skin-card ${skin.rarity}`;
                card.innerHTML = `
                    <img src="${skin.img}">
                    <div class="skin-name">${skin.name}</div>
                    <div class="skin-price">$${skin.price}</div>
                `;
                container.appendChild(card);
            });
        }

        // Логика контракта (Трейда)
        function renderTradeLists() {
            const availableContainer = document.getElementById('trade-available-list');
            const slotsContainer = document.getElementById('trade-slots-area');
            
            availableContainer.innerHTML = '';
            
            // Фильтруем те, что уже не в трейде
            const availableSkins = gameState.inventory.filter(s => !gameState.tradeSelected.includes(s.id));
            
            availableSkins.forEach(skin => {
                const card = document.createElement('div');
                card.className = `skin-card ${skin.rarity}`;
                card.style.cursor = 'pointer';
                card.innerHTML = `
                    <img src="${skin.img}">
                    <div class="skin-name">${skin.name}</div>
                `;
                card.onclick = () => selectForTrade(skin.id);
                availableContainer.appendChild(card);
            });

            // Рендер слотов трейда
            if (gameState.tradeSelected.length === 0) {
                slotsContainer.innerHTML = '<div style="color: #555; grid-column: span 3;">Нажмите на скины снизу, чтобы добавить</div>';
            } else {
                slotsContainer.innerHTML = '';
                gameState.tradeSelected.forEach(skinId => {
                    const skin = gameState.inventory.find(s => s.id === skinId);
                    const slot = document.createElement('div');
                    slot.className = `skin-card ${skin.rarity}`;
                    slot.style.border = '1px solid #444';
                    slot.innerHTML = `<img src="${skin.img}" style="width:50px;">`;
                    slot.onclick = () => deselectFromTrade(skinId);
                    slotsContainer.appendChild(slot);
                });
            }
        }

        function selectForTrade(id) {
            if (gameState.tradeSelected.length >= 3) return;
            gameState.tradeSelected.push(id);
            renderTradeLists();
        }

        function deselectFromTrade(id) {
            gameState.tradeSelected = gameState.tradeSelected.filter(sid => sid !== id);
            renderTradeLists();
        }

        // Выполнение трейд-контракта
        function executeTrade() {
            if (gameState.tradeSelected.length < 3) {
                alert("Для контракта нужно выбрать ровно 3 скина!");
                return;
            }

            // Удаляем старые скины из инвентаря
            gameState.inventory = gameState.inventory.filter(s => !gameState.tradeSelected.includes(s.id));
            gameState.tradeSelected = [];

            // Бот выдает скин (рандомно, но с шансом получить дорогой)
            const pool = skinPool.filter(s => s.rarity === "covert" || s.rarity === "classified");
            const prizeSkin = { ...pool[Math.floor(Math.random() * pool.length)], id: Date.now() };
            
            gameState.inventory.push(prizeSkin);
            
            alert(`🔄 Трейд завершен! Бот выдал вам: ${prizeSkin.name}`);
            updateUI();
        }
    </script>
</body>
</html>
