
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Горькая правда</title>
    <style>
        /* Общие стили страницы */
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            user-select: none; /* Запрет выделения текста */
        }

        /* Заголовки */
        .header {
            text-align: center;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 600;
            margin: 0 0 5px 0;
            letter-spacing: 0.5px;
        }

        .header h2 {
            font-size: 18px;
            font-weight: 400;
            margin: 0;
            color: #d1d1d1;
            letter-spacing: 0.5px;
        }

        /* Сетка для переключателей */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 50px 40px;
            text-align: center;
        }

        /* Контейнер одного переключателя */
        .switch-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Сам переключатель */
        .toggle-wrapper {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 30px;
            margin-bottom: 15px;
            -webkit-tap-highlight-color: transparent;
        }

        .toggle-wrapper input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* Ползунок (трек) */
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ff3b30; /* Изначально красный */
            transition: .4s;
            border-radius: 34px;
            /* Красное свечение */
            box-shadow: 0 0 15px 3px rgba(255, 59, 48, 0.7);
        }

        /* Круглый бегунок */
        .slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s cubic-bezier(0.4, 0.0, 0.2, 1);
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        /* Состояние "Включено" (Зеленый) */
        input:checked + .slider {
            background-color: #34c759;
            /* Зеленое свечение */
            box-shadow: 0 0 15px 3px rgba(52, 199, 89, 0.7);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }
        
        /* Стили для заблокированных переключателей (не меняем внешний вид) */
        input:disabled + .slider {
            cursor: default;
        }

        /* Текст под переключателем */
        .label-text {
            font-size: 15px;
            color: #eaeaea;
            letter-spacing: 0.5px;
        }

        /* Анимация "дергания" */
        .twitch {
            animation: twitchAnim 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes twitchAnim {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px); }
            40% { transform: translateX(5px); }
            60% { transform: translateX(-3px); }
            80% { transform: translateX(3px); }
        }

        /* Адаптация под очень узкие экраны */
        @media (max-width: 360px) {
            .grid-container {
                gap: 40px 20px;
            }
            .toggle-wrapper {
                width: 48px;
                height: 28px;
            }
            .slider:before {
                height: 22px;
                width: 22px;
            }
            input:checked + .slider:before {
                transform: translateX(20px);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Горькая правда</h1>
        <h2>The bitter truth</h2>
    </div>

    <div class="grid-container">
        <!-- Верхний ряд -->
        <div class="switch-item">
            <label class="toggle-wrapper" id="wrap-money">
                <input type="checkbox" id="money">
                <span class="slider"></span>
            </label>
            <span class="label-text">деньги</span>
        </div>

        <div class="switch-item">
            <label class="toggle-wrapper" id="wrap-knowledge">
                <input type="checkbox" id="knowledge">
                <span class="slider"></span>
            </label>
            <span class="label-text">знание</span>
        </div>

        <div class="switch-item">
            <label class="toggle-wrapper" id="wrap-idea">
                <input type="checkbox" id="idea">
                <span class="slider"></span>
            </label>
            <span class="label-text">идея</span>
        </div>

        <!-- Нижний ряд -->
        <div class="switch-item">
            <label class="toggle-wrapper" id="wrap-career">
                <input type="checkbox" id="career">
                <span class="slider"></span>
            </label>
            <span class="label-text">карьера</span>
        </div>

        <div class="switch-item">
            <label class="toggle-wrapper" id="wrap-car">
                <input type="checkbox" id="car">
                <span class="slider"></span>
            </label>
            <span class="label-text">машина</span>
        </div>

        <div class="switch-item">
            <label class="toggle-wrapper" id="wrap-love">
                <input type="checkbox" id="love">
                <span class="slider"></span>
            </label>
            <span class="label-text">любовь</span>
        </div>
    </div>

    <script>
        // Идентификаторы всех переключателей, кроме любви
        const standardSwitches = ['money', 'knowledge', 'idea', 'career', 'car'];
        const loveSwitch = document.getElementById('love');

        // Логика для обычных переключателей
        standardSwitches.forEach(id => {
            const el = document.getElementById(id);
            
            el.addEventListener('change', (e) => {
                // Если мы пытаемся включить переключатель, когда включена Любовь
                if (el.checked && loveSwitch.checked) {
                    
                    // Блокируем на время, чтобы избежать багов при быстрых кликах
                    el.disabled = true;
                    
                    // Ждем 350мс, чтобы ползунок успел доехать до зеленого состояния
                    setTimeout(() => {
                        // Выключаем его (становится красным)
                        el.checked = false;
                        
                        // Добавляем класс анимации "дергания" на родительскую обертку
                        const wrapper = document.getElementById('wrap-' + id);
                        wrapper.classList.add('twitch');
                        
                        // Убираем анимацию и разблокируем после её завершения
                        setTimeout(() => {
                            wrapper.classList.remove('twitch');
                            el.disabled = false;
                        }, 350); 
                    }, 350); // Время, за которое ползунок успевает показать зеленый цвет
                }
            });
        });

        // Логика для переключателя "Любовь"
        loveSwitch.addEventListener('change', (e) => {
            if (loveSwitch.checked) {
                // Проверяем, включены ли ВСЕ остальные 5 переключателей
                const allOthersOn = standardSwitches.every(id => document.getElementById(id).checked);
                
                if (allOthersOn) {
                    // Блокируем все инпуты на время анимации сброса
                    const allInputs = [...standardSwitches, 'love'].map(id => document.getElementById(id));
                    allInputs.forEach(input => input.disabled = true);
                    
                    // Даем небольшую паузу (600мс), чтобы пользователь увидел, 
                    // что включено всё сразу, и осознал момент
                    setTimeout(() => {
                        // Сбрасываем ВСЕ ползунки в красное (выключенное) положение
                        allInputs.forEach(input => {
                            input.checked = false;
                            input.disabled = false; // Разблокируем обратно
                        });
                    }, 600);
                }
            }
        });
    </script>
</body>
</html>
