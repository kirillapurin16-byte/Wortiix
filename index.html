<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Premium Casino & Samurai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* ДИНАМИЧЕСКИЕ ПЕРЕМЕННЫЕ ЦВЕТА */
        :root {
            --hue: 210;
            --bg-base: hsl(var(--hue), 20%, 96%);
            --glass-bg: hsla(var(--hue), 30%, 100%, 0.75);
            --glass-border: hsla(var(--hue), 50%, 100%, 1);
            --glass-shadow: 0 10px 40px -10px hsla(var(--hue), 50%, 10%, 0.08);
            --text-main: hsl(var(--hue), 60%, 15%);
            --text-muted: hsl(var(--hue), 20%, 50%);
            --ambient-1: hsla(calc(var(--hue) + 40), 80%, 75%, 0.5);
            --ambient-2: hsla(calc(var(--hue) - 40), 80%, 75%, 0.5);
            --ambient-3: hsla(var(--hue), 90%, 80%, 0.4);
            --accent-btn: linear-gradient(135deg, hsl(var(--hue), 40%, 30%), hsl(var(--hue), 60%, 15%));
            --btn-shadow: 0 8px 25px hsla(var(--hue), 60%, 15%, 0.3);
        }

        body { 
            margin: 0; padding: 0; 
            font-family: 'Manrope', sans-serif; 
            color: var(--text-main); 
            background-color: var(--bg-base); 
            transition: background-color 0.5s ease;
            min-height: 100vh;
            /* Исправлено для iOS: убрано жесткое блокирование touch-action и скрытие overflow */
            overflow-x: hidden;
        }
        
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .ambient-glow-1 { position: absolute; top: -10%; left: -20%; width: 500px; height: 500px; background: var(--ambient-1); filter: blur(80px); border-radius: 50%; animation: float 15s ease-in-out infinite; transition: background 0.5s; }
        .ambient-glow-2 { position: absolute; bottom: -20%; right: -10%; width: 600px; height: 600px; background: var(--ambient-2); filter: blur(100px); border-radius: 50%; animation: float 18s ease-in-out infinite reverse; transition: background 0.5s; }
        .ambient-glow-3 { position: absolute; top: 40%; left: 60%; width: 400px; height: 400px; background: var(--ambient-3); filter: blur(90px); border-radius: 50%; animation: float 12s ease-in-out infinite alternate; transition: background 0.5s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(40px, -40px) scale(1.05); } 100% { transform: translate(0, 0) scale(1); } }

        .glass-panel { 
            background: var(--glass-bg); 
            backdrop-filter: blur(24px); 
            -webkit-backdrop-filter: blur(24px); 
            border: 1px solid var(--glass-border); 
            box-shadow: var(--glass-shadow); 
            transition: background 0.5s, border 0.5s, box-shadow 0.5s;
        }
        
        .btn-glass { 
            background: rgba(255,255,255,0.8); 
            border: 1px solid var(--glass-border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            color: var(--text-main); 
        }
        .btn-glass:active:not(:disabled) { transform: scale(0.96); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .btn-glass:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-main { background: var(--accent-btn); color: #fff; box-shadow: var(--btn-shadow); transition: all 0.3s; }
        .btn-main:active:not(:disabled) { transform: scale(0.96); box-shadow: 0 4px 10px hsla(var(--hue), 60%, 15%, 0.4); }
        .btn-main:disabled { filter: grayscale(100%); opacity: 0.7; box-shadow: none; }

        .text-main-color { color: var(--text-main); transition: color 0.5s; }
        .text-muted-color { color: var(--text-muted); transition: color 0.5s; }

        ::-webkit-scrollbar { display: none; }
        .font-mono-num { font-family: 'Space Mono', monospace; }
        
        .tab-content { display: none; opacity: 0; }
        .tab-content.active { display: flex; flex-direction: column; opacity: 1; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .slot-reel { font-size: 3.5rem; filter: blur(0px); transition: filter 0.3s, transform 0.2s; display: flex; justify-content: center; width: 33%; font-weight: 800; }
        .spinning .slot-reel { filter: blur(5px); animation: spinReel 0.2s linear infinite; }
        @keyframes spinReel { 0% { transform: translateY(-40px); } 100% { transform: translateY(40px); } }

        .wheel-container { 
            width: 260px; height: 260px; border-radius: 50%; position: relative; overflow: hidden; 
            transition: transform 9s cubic-bezier(0.1, 0.9, 0.05, 1); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 0 0 6px rgba(255,255,255,0.9); 
        }
        .wheel-center { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 45px; height: 45px; background: #fff; border-radius: 50%; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; display: flex; align-items: center; justify-content: center;
        }
        .wheel-center::after { content: ''; width: 12px; height: 12px; background: #e2e8f0; border-radius: 50%; }
        .wheel-pointer { 
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; 
            border-top: 24px solid var(--text-main); z-index: 20; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); transition: border-color 0.5s;
        }

        #samurai-target { transition: transform 0.2s; }
        .slash-anim { animation: slashAction 0.6s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes slashAction { 
            0% { transform: translate(-50%, -50%) rotate(45deg) scaleX(0); opacity: 1; } 
            50% { transform: translate(-50%, -50%) rotate(45deg) scaleX(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) rotate(45deg) scaleX(1.2); opacity: 0; }
        }
        .split-obj { animation: splitApart 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes splitApart {
            0% { transform: scale(1); filter: blur(0); }
            50% { transform: scale(1.2) rotate(10deg); filter: blur(2px); opacity: 0.5;}
            100% { transform: scale(0); opacity: 0; }
        }

        .toast { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); padding: 14px 28px; border-radius: 20px; font-weight: 800; font-size: 1.1rem; z-index: 100; opacity: 0; pointer-events: none; }
        .toast.win { background: #fff; color: #15803d; box-shadow: 0 10px 40px rgba(21, 128, 61, 0.15); border: 1px solid rgba(21, 128, 61, 0.2); animation: toastAnim 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        .toast.lose { background: #fff; color: #be123c; box-shadow: 0 10px 40px rgba(190, 18, 60, 0.15); border: 1px solid rgba(190, 18, 60, 0.2); animation: toastAnim 2s cubic-bezier(0.1, 0.8, 0.2, 1) forwards; }
        @keyframes toastAnim { 0% { opacity: 0; transform: translate(-50%, 20px) scale(0.9); } 10% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); } 20% { transform: translate(-50%, -50%) scale(1); } 80% { opacity: 1; transform: translate(-50%, -50%); } 100% { opacity: 0; transform: translate(-50%, -80px); } }

        #boot-loader { transition: opacity 0.5s ease; background: var(--bg-base); z-index: 2000; }
        #welcome-modal { opacity: 0; pointer-events: none; transition: opacity 0.4s; z-index: 1500; display: none; }
        #welcome-modal.show { opacity: 1; pointer-events: auto; display: flex; }
        #welcome-card { transform: translateY(100%); transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #welcome-modal.show #welcome-card { transform: translateY(0); }
        #app-core { opacity: 0; transform: translateY(10px); transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; }
        
        .nav-btn { color: var(--text-muted); transition: all 0.3s; }
        .nav-btn.active { background: rgba(255,255,255,0.9); color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bet-option { border: 2px solid transparent; }
        .bet-option.selected { border-color: var(--text-main); background: rgba(255,255,255,0.5); }
    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="ambient-glow-1"></div>
    <div class="ambient-glow-2"></div>
    <div class="ambient-glow-3"></div>
</div>

<div id="boot-loader" class="fixed inset-0 flex flex-col items-center justify-center">
    <div class="w-12 h-12 relative mb-6">
        <div class="absolute inset-0 rounded-full border-t-2 border-[var(--text-main)] animate-spin"></div>
        <div class="absolute inset-2 rounded-full border-r-2 border-[var(--text-muted)] animate-[spin_1.5s_linear_infinite_reverse]"></div>
    </div>
</div>

<div id="welcome-modal" class="fixed inset-0 flex items-end justify-center pb-8 bg-black/10 backdrop-blur-sm">
    <div id="welcome-card" class="glass-panel p-8 rounded-[2rem] mx-4 text-center max-w-sm shadow-2xl mb-[env(safe-area-inset-bottom)]">
        <div class="text-4xl mb-4">👋</div>
        <p class="text-main-color font-bold text-lg leading-snug mb-6">Здравствуйте, спасибо что решили испытать мой проект, он делался мной 3 часа, удачи!</p>
        <button onclick="CasinoApp.startApp()" class="btn-main w-full py-4 rounded-xl font-extrabold text-sm tracking-widest uppercase">
            ПРИСТУПИТЬ
        </button>
    </div>
</div>

<div id="app-core" class="w-full max-w-md mx-auto relative min-h-[100dvh] flex flex-col pt-[env(safe-area-inset-top)] pb-[env(safe-area-inset-bottom)]">
    
    <div class="px-6 pt-6 pb-4 flex items-center justify-between z-10">
        <h1 class="text-2xl font-extrabold tracking-tight text-main-color">
            VIP<span class="text-muted-color font-light ml-1">CASINO</span>
        </h1>
        <div class="flex items-center gap-2">
            <button id="rescue-btn" onclick="CasinoApp.rescueFunds()" class="hidden bg-gradient-to-r from-green-500 to-emerald-600 text-white px-3 py-2 rounded-xl font-bold shadow-[0_0_15px_rgba(16,185,129,0.5)] animate-pulse text-xs tracking-wider transition-all active:scale-95">
                +100К ₽
            </button>
            <button onclick="CasinoApp.changeTheme()" class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-main-color shadow-sm active:scale-95 transition-transform">
                🎨
            </button>
            <div class="glass-panel px-4 py-2 rounded-2xl flex items-center gap-3">
                <div class="flex flex-col items-end">
                    <span class="text-muted-color text-[9px] font-bold uppercase tracking-widest leading-none">Баланс</span>
                    <span id="user-balance" class="font-mono-num font-bold text-lg text-main-color leading-none mt-1">10 000 ₽</span>
                </div>
            </div>
        </div>
    </div>

    <div class="flex flex-nowrap overflow-x-auto px-4 pb-2 gap-2 z-10 min-h-[50px] items-center" style="-webkit-overflow-scrolling: touch; scrollbar-width: none;">
        <button onclick="CasinoApp.setTab('slots')" id="nav-slots" class="nav-btn active flex-shrink-0 px-6 py-3 rounded-full text-xs font-bold tracking-wider">СЛОТЫ</button>
        <button onclick="CasinoApp.setTab('roulette')" id="nav-roulette" class="nav-btn flex-shrink-0 px-6 py-3 rounded-full text-xs font-bold tracking-wider">РУЛЕТКА</button>
        <button onclick="CasinoApp.setTab('samurai')" id="nav-samurai" class="nav-btn flex-shrink-0 px-6 py-3 rounded-full text-xs font-bold tracking-wider">САМУРАЙ</button>
        <button onclick="CasinoApp.setTab('crash')" id="nav-crash" class="nav-btn flex-shrink-0 px-6 py-3 rounded-full text-xs font-bold tracking-wider">КРАШ</button>
    </div>

    <div class="flex-1 relative px-4 py-2 flex flex-col z-10">
        
        <div id="tab-slots" class="tab-content active h-full justify-center pb-4">
            <div class="glass-panel rounded-[2rem] p-8 w-full relative overflow-hidden flex flex-col items-center justify-center h-56 mb-2">
                <div class="absolute w-full h-[2px] bg-black/5 top-1/2 -translate-y-1/2 z-0"></div>
                <div class="flex justify-between items-center w-full px-4 z-10" id="slot-reels">
                    <div class="slot-reel" id="reel-1">🍒</div>
                    <div class="slot-reel" id="reel-2">🍋</div>
                    <div class="slot-reel" id="reel-3">💎</div>
                </div>
            </div>
            <div class="text-center text-[10px] text-muted-color font-semibold tracking-widest uppercase mb-6">3 в ряд = x10 | 2 в ряд = x2</div>
        </div>

        <div id="tab-roulette" class="tab-content h-full justify-center pb-4">
            <div class="flex flex-col items-center justify-center gap-6 mb-4">
                <div class="relative">
                    <div class="wheel-pointer"></div>
                    <div class="wheel-container" id="roulette-wheel">
                        <div class="wheel-center"></div>
                    </div>
                </div>
                
                <div class="grid grid-cols-3 gap-2 w-full">
                    <button onclick="CasinoApp.selectRouletteColor('red')" id="r-red" class="bet-option bg-white/70 py-3 rounded-2xl font-bold text-xs tracking-wider flex flex-col items-center shadow-sm">
                        <span class="w-4 h-4 rounded-full bg-[#ef4444] mb-1 shadow-sm"></span>
                        <span class="text-main-color">КРАСНОЕ</span>
                    </button>
                    <button onclick="CasinoApp.selectRouletteColor('green')" id="r-green" class="bet-option bg-white/70 py-3 rounded-2xl font-bold text-xs tracking-wider flex flex-col items-center shadow-sm">
                        <span class="w-4 h-4 rounded-full bg-[#10b981] mb-1 shadow-sm"></span>
                        <span class="text-main-color">ЗЕЛЕНОЕ</span>
                    </button>
                    <button onclick="CasinoApp.selectRouletteColor('black')" id="r-black" class="bet-option bg-white/70 py-3 rounded-2xl font-bold text-xs tracking-wider flex flex-col items-center shadow-sm">
                        <span class="w-4 h-4 rounded-full bg-[#0f172a] mb-1 shadow-sm"></span>
                        <span class="text-main-color">ЧЕРНОЕ</span>
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-samurai" class="tab-content h-full justify-center pb-4">
            <div class="glass-panel rounded-[2rem] w-full relative overflow-hidden flex flex-col items-center justify-center h-56 mb-6">
                <div id="slash-line" class="absolute top-1/2 left-1/2 w-[200%] h-[3px] bg-red-500/80 shadow-[0_0_20px_red] -translate-x-1/2 -translate-y-1/2 rotate-12 scale-x-0 z-20 pointer-events-none origin-center"></div>
                <div id="samurai-target" class="text-8xl drop-shadow-xl z-10 relative flex items-center justify-center w-full h-full">🏮</div>
                <div id="samurai-result" class="absolute inset-0 flex items-center justify-center opacity-0 scale-50 transition-all duration-500 z-0">
                    <span class="text-6xl font-black text-main-color drop-shadow-lg" id="samurai-multiplier">x0</span>
                </div>
            </div>
            <div class="text-center text-[10px] text-muted-color font-semibold tracking-widest uppercase">Разрежь фонарь, чтобы узнать судьбу ставки</div>
        </div>

        <div id="tab-crash" class="tab-content h-full justify-center pb-4">
            <div class="w-full h-56 glass-panel rounded-[2rem] relative overflow-hidden flex flex-col items-center justify-center mb-6">
                <div class="absolute inset-0 opacity-[0.05]" style="background-image: linear-gradient(var(--text-main) 1px, transparent 1px), linear-gradient(90deg, var(--text-main) 1px, transparent 1px); background-size: 20px 20px;"></div>
                <div class="text-[10px] text-muted-color font-bold mb-2 uppercase tracking-[0.2em] z-10" id="crash-status">Ожидание ставки</div>
                <div class="text-7xl font-black font-mono-num text-main-color transition-colors duration-300 z-10" id="crash-val">1.00x</div>
            </div>
        </div>
        
        <div class="mt-auto glass-panel rounded-[2rem] p-5 mb-4 z-10">
            <div class="flex justify-between items-center bg-white/50 rounded-2xl p-1.5 mb-4 shadow-inner border border-white/40">
                <button onclick="CasinoApp.adjustBet(-100)" class="w-12 h-12 rounded-xl bg-white/80 hover:bg-white flex items-center justify-center text-xl font-light text-main-color transition-colors shadow-sm">-</button>
                <div class="flex flex-col items-center flex-1">
                    <span class="text-[9px] text-muted-color uppercase tracking-widest font-bold mb-0.5">Сумма (₽)</span>
                    <input type="number" id="bet-val" value="100" readonly class="bg-transparent text-center font-mono-num font-bold text-xl text-main-color w-full outline-none">
                </div>
                <button onclick="CasinoApp.adjustBet(100)" class="w-12 h-12 rounded-xl bg-white/80 hover:bg-white flex items-center justify-center text-xl font-light text-main-color transition-colors shadow-sm">+</button>
            </div>
            
            <div class="grid grid-cols-4 gap-2 mb-4">
                <button onclick="CasinoApp.setBet('min')" class="btn-glass py-2.5 rounded-xl text-[10px] font-bold tracking-wider">MIN</button>
                <button onclick="CasinoApp.setBet('x2')" class="btn-glass py-2.5 rounded-xl text-[10px] font-bold tracking-wider">X2</button>
                <button onclick="CasinoApp.setBet('1/2')" class="btn-glass py-2.5 rounded-xl text-[10px] font-bold tracking-wider">1/2</button>
                <button onclick="CasinoApp.setBet('max')" class="btn-glass py-2.5 rounded-xl text-[10px] font-bold tracking-wider">MAX</button>
            </div>

            <button id="main-btn" onclick="CasinoApp.play()" class="btn-main w-full py-4 rounded-2xl font-extrabold text-sm tracking-widest uppercase">
                КРУТИТЬ СЛОТЫ
            </button>
        </div>
    </div>
</div>

<script>
const CasinoApp = (() => {
    let savedBalance = localStorage.getItem('vipCasinoBalance');
    let balance = savedBalance !== null ? parseFloat(savedBalance) : 10000;
    
    let currentBet = 100;
    let activeTab = 'slots';
    let isPlaying = false;
    
    let rltColor = null; 
    let rltDegree = 0;
    
    let crashActive = false;
    let crashVal = 1.0;
    let crashFrame = null;

    const rltNumbers = [0,32,15,19,4,21,2,25,17,34,6,27,13,36,11,30,8,23,10,5,24,16,33,1,20,14,31,9,22,18,29,7,28,12,35,3,26];
    const rltReds = [1,3,5,7,9,12,14,16,18,19,21,23,25,27,30,32,34,36];
    const slotSymbols = ['🍒', '🍋', '🔔', '💎', '7️⃣', '🍉'];

    const els = {
        balance: document.getElementById('user-balance'),
        betInput: document.getElementById('bet-val'),
        mainBtn: document.getElementById('main-btn')
    };

    const formatMoney = (val) => new Intl.NumberFormat('ru-RU').format(Math.floor(val)) + ' ₽';
    
    const updateBalance = (amount) => {
        balance += amount;
        if(balance < 0) balance = 0; 
        
        localStorage.setItem('vipCasinoBalance', balance);
        els.balance.innerText = formatMoney(balance);
        
        if(balance < currentBet && balance > 0) CasinoApp.setBet('max');

        const rescueBtn = document.getElementById('rescue-btn');
        if (balance <= 0) {
            rescueBtn.classList.remove('hidden');
        } else {
            rescueBtn.classList.add('hidden');
        }
    };

    const showToast = (msg, type) => {
        const el = document.createElement('div');
        el.className = `toast ${type}`;
        el.innerText = msg;
        document.getElementById('app-core').appendChild(el);
        setTimeout(() => el.remove(), 2000);
    };

    const updateBtnUI = () => {
        if(isPlaying && activeTab !== 'crash') {
            els.mainBtn.innerText = 'ОЖИДАНИЕ...';
            els.mainBtn.disabled = true;
            return;
        }
        els.mainBtn.disabled = false;
        if(activeTab === 'slots') els.mainBtn.innerText = 'КРУТИТЬ СЛОТЫ';
        if(activeTab === 'roulette') {
            const colorNames = {red: 'КРАСНОЕ', black: 'ЧЕРНОЕ', green: 'ЗЕЛЕНОЕ'};
            els.mainBtn.innerText = rltColor ? `СТАВКА НА ${colorNames[rltColor]}` : 'ВЫБЕРИТЕ ЦВЕТ';
        }
        if(activeTab === 'samurai') els.mainBtn.innerText = 'УДАР КАТАНОЙ';
        if(activeTab === 'crash') els.mainBtn.innerText = crashActive ? 'ЗАБРАТЬ ВЫИГРЫШ' : 'НАЧАТЬ ПОЛЕТ';
    };

    const initRouletteVisual = () => {
        const wheel = document.getElementById('roulette-wheel');
        const slice = 360 / 37;
        let gradient = 'conic-gradient(';
        rltNumbers.forEach((num, i) => {
            let color = '#0f172a';
            if (num === 0) color = '#10b981';
            else if (rltReds.includes(num)) color = '#ef4444';
            gradient += `${color} ${i * slice}deg ${(i + 1) * slice}deg${i === 36 ? ')' : ','}`;
        });
        wheel.style.background = gradient;
    };

    const showCoreApp = () => {
        const app = document.getElementById('app-core');
        app.style.opacity = '1';
        app.style.transform = 'translateY(0)';
        app.style.pointerEvents = 'auto';
    };

    return {
        init: () => {
            els.balance.innerText = formatMoney(balance);
            if(balance <= 0) document.getElementById('rescue-btn').classList.remove('hidden');

            initRouletteVisual();
            updateBtnUI();
            
            setTimeout(() => {
                const loader = document.getElementById('boot-loader');
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.remove();
                    
                    // Проверка: заходил ли пользователь ранее
                    const hasVisited = localStorage.getItem('vipCasinoVisited');
                    if (hasVisited) {
                        // Окно уже показывалось, удаляем его из DOM и сразу включаем приложение
                        document.getElementById('welcome-modal').remove();
                        showCoreApp();
                    } else {
                        // Первый раз — показываем модальное окно
                        document.getElementById('welcome-modal').classList.add('show');
                    }
                }, 500);
            }, 1000);
        },

        startApp: () => {
            // Сохраняем флаг, что пользователь нажал "Приступить"
            localStorage.setItem('vipCasinoVisited', 'true');
            document.getElementById('welcome-modal').classList.remove('show');
            setTimeout(() => {
                document.getElementById('welcome-modal').remove();
                showCoreApp();
            }, 400);
        },

        rescueFunds: () => {
            if (balance <= 0) {
                updateBalance(100000);
                showToast('Удача на твоей стороне! +100 000 ₽', 'win');
                if (currentBet === 0) CasinoApp.setBet('min');
            }
        },

        changeTheme: () => {
            const newHue = Math.floor(Math.random() * 360);
            document.documentElement.style.setProperty('--hue', newHue);
        },

        setTab: (id) => {
            if(isPlaying && (activeTab !== 'crash' || crashActive)) return; 
            
            ['slots', 'roulette', 'samurai', 'crash'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.remove('active');
                document.getElementById(`nav-${t}`).classList.remove('active');
            });
            document.getElementById(`tab-${id}`).classList.add('active');
            document.getElementById(`nav-${id}`).classList.add('active');
            activeTab = id;
            updateBtnUI();
        },

        adjustBet: (val) => {
            if(isPlaying && activeTab !== 'crash') return;
            currentBet += val;
            if(currentBet < 10) currentBet = balance > 0 ? 10 : 0;
            if(currentBet > balance) currentBet = balance;
            els.betInput.value = currentBet;
        },

        setBet: (type) => {
            if(isPlaying && activeTab !== 'crash') return;
            if(type === 'min') currentBet = balance >= 10 ? 10 : balance;
            if(type === 'max') currentBet = balance;
            if(type === 'x2') currentBet = Math.min(currentBet * 2, balance);
            if(type === '1/2') currentBet = Math.max(Math.floor(currentBet / 2), balance >= 10 ? 10 : balance);
            if(balance === 0) currentBet = 0;
            els.betInput.value = currentBet;
        },

        selectRouletteColor: (color) => {
            if(isPlaying) return;
            rltColor = color;
            ['red', 'green', 'black'].forEach(c => {
                const el = document.getElementById(`r-${c}`);
                if(c === color) el.classList.add('selected');
                else el.classList.remove('selected');
            });
            updateBtnUI();
        },

        play: () => {
            if (balance < currentBet && !crashActive) {
                return showToast('Недостаточно средств', 'lose');
            }
            if (currentBet <= 0 && !crashActive) {
                return showToast('Ставка должна быть больше 0', 'lose');
            }

            if(activeTab === 'slots') {
                if(isPlaying) return; 
                isPlaying = true;
                updateBalance(-currentBet);
                updateBtnUI();
                
                const c = document.getElementById('slot-reels');
                c.classList.add('spinning');
                
                let iv = setInterval(() => {
                    for(let i=1; i<=3; i++) {
                        document.getElementById(`reel-${i}`).innerText = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
                    }
                }, 150); 

                setTimeout(() => {
                    clearInterval(iv); 
                    c.classList.remove('spinning');
                    
                    const r = Math.random();
                    let res = [];
                    if(r > 0.85) { 
                        const sym = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
                        res = [sym, sym, sym];
                        updateBalance(currentBet * 10);
                        showToast(`+${formatMoney(currentBet * 10)}`, 'win');
                    } else if (r > 0.5) { 
                        const sym1 = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
                        let sym2 = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
                        while(sym2 === sym1) sym2 = slotSymbols[Math.floor(Math.random() * slotSymbols.length)];
                        const pos = Math.floor(Math.random() * 3);
                        res = [sym1, sym1, sym1];
                        res[pos] = sym2;
                        updateBalance(currentBet * 2);
                        showToast(`+${formatMoney(currentBet * 2)}`, 'win');
                    } else { 
                        let arr = [...slotSymbols].sort(() => 0.5 - Math.random());
                        res = [arr[0], arr[1], arr[2]];
                        showToast('Не повезло', 'lose');
                    }

                    for(let i=1; i<=3; i++) {
                        document.getElementById(`reel-${i}`).innerText = res[i-1];
                    }
                    
                    isPlaying = false;
                    updateBtnUI();
                }, 3500);
            }

            if(activeTab === 'roulette') {
                if(!rltColor) return showToast('Выберите цвет', 'lose');
                if(isPlaying) return;
                isPlaying = true;
                updateBalance(-currentBet);
                updateBtnUI();

                const el = document.getElementById('roulette-wheel');
                
                const winIndex = Math.floor(Math.random() * 37);
                const winNum = rltNumbers[winIndex];
                
                let winColor = 'black';
                if(winNum === 0) winColor = 'green';
                else if(rltReds.includes(winNum)) winColor = 'red';

                const slice = 360 / 37;
                const targetAngle = 360 - ((winIndex * slice) + (slice / 2));
                const currentAngle = rltDegree % 360;
                
                let rotationDiff = targetAngle - currentAngle;
                if (rotationDiff < 0) rotationDiff += 360; 
                
                rltDegree += (360 * 8) + rotationDiff;
                el.style.transform = `rotate(${rltDegree}deg)`;

                setTimeout(() => {
                    if(winColor === rltColor) {
                        const mult = winColor === 'green' ? 14 : 2;
                        updateBalance(currentBet * mult);
                        showToast(`+${formatMoney(currentBet * mult)}`, 'win');
                    } else {
                        showToast('Мимо', 'lose');
                    }
                    
                    rltColor = null;
                    ['red', 'green', 'black'].forEach(c => document.getElementById(`r-${c}`).classList.remove('selected'));
                    
                    isPlaying = false;
                    updateBtnUI();
                }, 9200); 
            }

            if(activeTab === 'samurai') {
                if(isPlaying) return;
                isPlaying = true;
                updateBalance(-currentBet);
                updateBtnUI();

                const target = document.getElementById('samurai-target');
                const slashLine = document.getElementById('slash-line');
                const resultBox = document.getElementById('samurai-result');
                const multiText = document.getElementById('samurai-multiplier');

                target.classList.remove('split-obj');
                target.style.opacity = '1';
                resultBox.style.opacity = '0';
                resultBox.style.transform = 'scale(0.5)';
                resultBox.style.zIndex = '0';

                slashLine.classList.remove('slash-anim');
                void slashLine.offsetWidth; 
                slashLine.classList.add('slash-anim');

                setTimeout(() => {
                    target.classList.add('split-obj');
                    
                    const r = Math.random();
                    let mult = 0;
                    if(r > 0.9) mult = 5;       
                    else if(r > 0.7) mult = 2;  
                    else if(r > 0.4) mult = 1.5; 
                    
                    multiText.innerText = `x${mult}`;
                    
                    if (mult > 0) multiText.style.color = '#15803d'; 
                    else multiText.style.color = '#be123c'; 

                    resultBox.style.zIndex = '30';
                    resultBox.style.opacity = '1';
                    resultBox.style.transform = 'scale(1)';

                    setTimeout(() => {
                        if(mult > 0) {
                            updateBalance(currentBet * mult);
                            showToast(`+${formatMoney(currentBet * mult)}`, 'win');
                        } else {
                            showToast('Пусто', 'lose');
                        }
                        
                        setTimeout(() => {
                            target.classList.remove('split-obj');
                            resultBox.style.opacity = '0';
                            isPlaying = false;
                            updateBtnUI();
                        }, 1500);

                    }, 500);

                }, 300); 
            }

            if(activeTab === 'crash') {
                const vEl = document.getElementById('crash-val');
                const sEl = document.getElementById('crash-status');

                if(crashActive) {
                    crashActive = false; 
                    isPlaying = false;
                    cancelAnimationFrame(crashFrame);
                    
                    const winAmt = currentBet * crashVal;
                    updateBalance(winAmt);
                    
                    sEl.innerText = 'ВЫИГРЫШ ЗАБРАН';
                    vEl.style.color = '#15803d'; 
                    showToast(`+${formatMoney(winAmt)}`, 'win');
                    updateBtnUI();
                    return;
                }
                
                crashActive = true; 
                isPlaying = true;
                crashVal = 1.00;
                
                updateBalance(-currentBet);
                updateBtnUI(); 
                
                sEl.innerText = 'ПОЛЕТ...';
                vEl.style.color = 'var(--text-main)';
                vEl.style.transform = 'scale(1)';

                const r = Math.random();
                let crashAt = 1.0;
                if (r < 0.05) crashAt = 1.0; 
                else crashAt = 1.0 / (1.0 - Math.random()); 
                if(crashAt > 50) crashAt = 50; 
                
                let speed = 0.0001;
                let lastTime = performance.now();

                const updateCrash = (time) => {
                    const dt = time - lastTime;
                    lastTime = time;
                    
                    speed += 0.000005 * dt;
                    crashVal += (speed * 0.3) * dt; 
                    
                    vEl.innerText = crashVal.toFixed(2) + "x";
                    
                    if(crashVal >= crashAt) {
                        crashVal = crashAt; 
                        vEl.innerText = crashVal.toFixed(2) + "x";
                        crashActive = false; 
                        isPlaying = false;
                        
                        sEl.innerText = 'КРАШ!';
                        vEl.style.color = '#be123c'; 
                        
                        updateBtnUI(); 
                        showToast('График обвалился', 'lose'); 
                        return;
                    }
                    if(crashActive) crashFrame = requestAnimationFrame(updateCrash);
                };
                crashFrame = requestAnimationFrame(updateCrash);
            }
        }
    };
})();

document.addEventListener('DOMContentLoaded', CasinoApp.init);
</script>
</body>
</html>
