<!DOCTYPE html>
<html lang="ru">
<head>
    <!-- Мета-теги для сброса кэша -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Техническое обслуживание</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --neon-violet: #8b5cf6;
            --neon-blue: #06b6d4;
            --neon-green: #10b981;
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100dvh;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(6, 182, 212, 0.15), transparent 25%);
        }

        .terminal-box {
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.1);
            position: relative;
        }

        .terminal-box::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-violet), transparent);
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.8), 0 0 20px rgba(139, 92, 246, 0.4);
        }

        .btn-neon {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.2), inset 0 0 10px rgba(6, 182, 212, 0.1);
            transition: all 0.3s ease;
        }

        .btn-neon:hover, .btn-neon:active {
            background: var(--neon-blue);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.6), inset 0 0 10px rgba(255, 255, 255, 0.5);
        }

        #game-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        canvas {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(6, 182, 212, 0.3);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.1);
            border-radius: 8px;
        }

        .d-pad {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(2, 60px);
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .d-btn {
            background: rgba(6, 182, 212, 0.1);
            border: 1px solid rgba(6, 182, 212, 0.5);
            border-radius: 12px;
            color: var(--neon-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            user-select: none;
            transition: background 0.1s;
        }

        .d-btn:active {
            background: rgba(6, 182, 212, 0.4);
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }

        .up { grid-column: 2; grid-row: 1; }
        .left { grid-column: 1; grid-row: 2; }
        .down { grid-column: 2; grid-row: 2; }
        .right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <!-- Экран обслуживания -->
    <div id="maintenance-screen" class="px-6 w-full max-w-md">
        <div class="terminal-box rounded-2xl p-8 text-center">
            <div class="w-16 h-16 mx-auto mb-4 border-2 border-[var(--neon-violet)] rounded-full flex items-center justify-center animate-pulse shadow-[0_0_15px_rgba(139,92,246,0.5)]">
                <span class="text-3xl">⚙️</span>
            </div>
            <h1 class="text-2xl font-bold glow-text uppercase tracking-widest mb-3">Система оффлайн</h1>
            <p class="text-sm text-gray-400 mb-8 leading-relaxed">
                Бот находится на техническом обслуживании. Как только он вернется в работу, мы вам сообщим.
            </p>
            <button onclick="initGame()" class="btn-neon w-full py-4 rounded-xl font-bold tracking-widest uppercase text-sm">
                Продолжить
            </button>
        </div>
    </div>

    <!-- Экран игры (Скрыт по умолчанию) -->
    <div id="game-screen" class="w-full max-w-md px-4">
        <div class="flex justify-between items-center w-full max-w-[300px] mb-4">
            <span class="text-[var(--neon-violet)] font-bold text-sm tracking-widest uppercase">NEON SNAKE</span>
            <span class="text-sm border border-[var(--neon-blue)] px-3 py-1 rounded text-[var(--neon-blue)]">SCORE: <span id="score">0</span></span>
        </div>
        
        <canvas id="gameCanvas" width="300" height="300"></canvas>
        
        <!-- Джойстик для телефона -->
        <div class="d-pad">
            <div class="d-btn up" id="btn-up">▲</div>
            <div class="d-btn left" id="btn-left">◀</div>
            <div class="d-btn down" id="btn-down">▼</div>
            <div class="d-btn right" id="btn-right">▶</div>
        </div>
    </div>

    <script>
        // Игровая логика
        let canvas, ctx, gameLoop;
        const gridSize = 15;
        const tileCount = 20; // 300 / 15
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = -1;
        let score = 0;

        function initGame() {
            // Скрываем текст, показываем игру
            document.getElementById('maintenance-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Управление с экрана (для Web App в Telegram)
            document.getElementById('btn-up').addEventListener('touchstart', (e) => { e.preventDefault(); if(dy !== 1) { dx = 0; dy = -1; }});
            document.getElementById('btn-down').addEventListener('touchstart', (e) => { e.preventDefault(); if(dy !== -1) { dx = 0; dy = 1; }});
            document.getElementById('btn-left').addEventListener('touchstart', (e) => { e.preventDefault(); if(dx !== 1) { dx = -1; dy = 0; }});
            document.getElementById('btn-right').addEventListener('touchstart', (e) => { e.preventDefault(); if(dx !== -1) { dx = 1; dy = 0; }});
            
            // На случай если открыли с ПК
            document.getElementById('btn-up').onclick = () => { if(dy !== 1) { dx = 0; dy = -1; } };
            document.getElementById('btn-down').onclick = () => { if(dy !== -1) { dx = 0; dy = 1; } };
            document.getElementById('btn-left').onclick = () => { if(dx !== 1) { dx = -1; dy = 0; } };
            document.getElementById('btn-right').onclick = () => { if(dx !== -1) { dx = 1; dy = 0; } };

            // Запуск цикла
            gameLoop = setInterval(update, 120);
        }

        function update() {
            // Движение
            let headX = snake[0].x + dx;
            let headY = snake[0].y + dy;

            // Проход сквозь стены
            if(headX < 0) headX = tileCount - 1;
            if(headX >= tileCount) headX = 0;
            if(headY < 0) headY = tileCount - 1;
            if(headY >= tileCount) headY = 0;

            let newHead = {x: headX, y: headY};

            // Столкновение с собой
            for(let i = 0; i < snake.length; i++) {
                if(snake[i].x === newHead.x && snake[i].y === newHead.y) {
                    // Сброс игры
                    snake = [{x: 10, y: 10}];
                    score = 0;
                    dx = 0; dy = -1;
                    document.getElementById('score').innerText = score;
                    return;
                }
            }

            snake.unshift(newHead);

            // Поедание яблока
            if(newHead.x === food.x && newHead.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                spawnFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            // Проверка, чтобы еда не появилась на змее
            for(let part of snake) {
                if(part.x === food.x && part.y === food.y) spawnFood();
            }
        }

        function draw() {
            // Очистка экрана
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка еды (неоновый фиолетовый)
            ctx.fillStyle = '#8b5cf6';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#8b5cf6';
            ctx.fillRect(food.x * gridSize + 1, food.y * gridSize + 1, gridSize - 2, gridSize - 2);

            // Отрисовка змеи (неоновый голубой)
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#06b6d4';
            for(let i = 0; i < snake.length; i++) {
                // Голова белая, тело голубое
                ctx.fillStyle = i === 0 ? '#ffffff' : '#06b6d4';
                ctx.fillRect(snake[i].x * gridSize + 1, snake[i].y * gridSize + 1, gridSize - 2, gridSize - 2);
            }
            
            ctx.shadowBlur = 0; // Сброс теней
        }
    </script>
</body>
</html>
